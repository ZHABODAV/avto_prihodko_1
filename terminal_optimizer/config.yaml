# Terminal Optimizer Configuration
# Base configuration file with all constants and parameters
# Can be overridden by environment variables prefixed with TERMINAL_OPTIMIZER_

# =============================================================================
# FLOW RATES (tonnes per hour)
# =============================================================================
rates:
  # Ship discharge rates
  ship_discharge:
    line1: 900.0
    line2_tank: 500.0
    line2_direct: 146.0

  # Ship loading rates
  ship_load:
    min: 500.0
    max: 900.0

  # Rail discharge rates
  rail_discharge:
    summer: 195.0
    winter: 146.0

  # Transfer rates
  transfer:
    sht: 500.0

# =============================================================================
# WAGON PARAMETERS
# =============================================================================
wagon:
  capacity: 65.0  # tonnes per wagon
  per_batch: 18
  prep_time_hours: 1.5  # Time to prepare wagons for next use
  reject_rate: 0.12  # Rejection rate during sunflower discharge (12%)
  max_batches_per_day:
    summer: 4
    winter: 3

# =============================================================================
# TANK CAPACITIES (for utilization calculations)
# =============================================================================
tank_capacity:
  rvs: 9900.0  # Standard RVS tank capacity (t)
  sht: 2700.0  # Shore tank capacity (t)

# =============================================================================
# PALM FRACTION PARAMETERS
# =============================================================================
palm:
  # Palm fraction priorities (higher number = higher priority for Line1)
  fraction_priorities:
    palm_oil: 10
    palm_oil_low3mcpd: 9
    palm_olein: 8
    palm_olein_low3mcpd: 7
    palm_stearin: 6
    palm_pfad: 5

  # Fraction size thresholds (tonnes)
  large_fraction_threshold: 5000.0  # Fractions above this go to Line1
  direct_discharge_threshold: 2000.0  # Fractions below this can go direct to rail

# =============================================================================
# SAFETY MARGINS AND THRESHOLDS
# =============================================================================
safety:
  margin: 0.10  # 10% safety margin for critical point calculations

# =============================================================================
# TIME PARAMETERS (hours)
# =============================================================================
time:
  berth_shift: 1.5  # Time for berth shift operations
  unberth_duration: 4.0  # Time for unberthing operations

# =============================================================================
# COMPATIBILITY MATRIX
# =============================================================================
# Product compatibility matrix (cleaning hours required)
# Key: from_product__to_product -> cleaning_hours
compatibility_matrix:
  # Sunflower transitions
  sunflower__sunflower: 0
  sunflower__palm_oil: 48
  sunflower__palm_olein: 48
  sunflower__palm_stearin: 48
  sunflower__palm_pfad: 48
  sunflower__palm_oil_low3mcpd: 72
  sunflower__palm_olein_low3mcpd: 72

  # Palm oil transitions
  palm_oil__sunflower: 48
  palm_oil__palm_oil: 0
  palm_oil__palm_olein: 12
  palm_oil__palm_stearin: 12
  palm_oil__palm_pfad: 12
  palm_oil__palm_oil_low3mcpd: 72
  palm_oil__palm_olein_low3mcpd: 72

  # Palm olein transitions
  palm_olein__sunflower: 48
  palm_olein__palm_oil: 12
  palm_olein__palm_olein: 0
  palm_olein__palm_stearin: 12
  palm_olein__palm_pfad: 12
  palm_olein__palm_oil_low3mcpd: 72
  palm_olein__palm_olein_low3mcpd: 72

  # Palm stearin transitions
  palm_stearin__sunflower: 48
  palm_stearin__palm_oil: 12
  palm_stearin__palm_olein: 12
  palm_stearin__palm_stearin: 0
  palm_stearin__palm_pfad: 12
  palm_stearin__palm_oil_low3mcpd: 72
  palm_stearin__palm_olein_low3mcpd: 72

  # Palm PFAD transitions
  palm_pfad__sunflower: 48
  palm_pfad__palm_oil: 12
  palm_pfad__palm_olein: 12
  palm_pfad__palm_stearin: 12
  palm_pfad__palm_pfad: 0
  palm_pfad__palm_oil_low3mcpd: 72
  palm_pfad__palm_olein_low3mcpd: 72

  # Low 3-MCPD transitions (high cleaning requirements)
  palm_oil_low3mcpd__sunflower: 168
  palm_oil_low3mcpd__palm_oil: 168
  palm_oil_low3mcpd__palm_olein: 168
  palm_oil_low3mcpd__palm_stearin: 168
  palm_oil_low3mcpd__palm_pfad: 168
  palm_oil_low3mcpd__palm_oil_low3mcpd: 0
  palm_oil_low3mcpd__palm_olein_low3mcpd: 12

  palm_olein_low3mcpd__sunflower: 168
  palm_olein_low3mcpd__palm_oil: 168
  palm_olein_low3mcpd__palm_olein: 168
  palm_olein_low3mcpd__palm_stearin: 168
  palm_olein_low3mcpd__palm_pfad: 168
  palm_olein_low3mcpd__palm_oil_low3mcpd: 12
  palm_olein_low3mcpd__palm_olein_low3mcpd: 0

# =============================================================================
# DEFAULT SCENARIO PARAMETERS
# =============================================================================
scenario_defaults:
  season: "summer"
  rail_discharge_rate: 195.0
  ship_load_rate_min: 500.0
  ship_load_rate_max: 900.0
  ship_discharge_line1: 900.0
  ship_discharge_line2_tank: 500.0
  ship_discharge_line2_direct: 146.0
  wagon_prep_time: 1.5
  wagon_reject_rate: 0.12
  berth_shift_time: 1.5
  cleaning_time_standard: 48.0
  cleaning_time_full: 72.0
  analysis_time: 72.0
  wagon_own_cost: 3000.0
  wagon_external_cost: 50000.0
  batch_extra_penalty: 50000.0
  total_wagon_fleet: 500

# =============================================================================
# ALGORITHM PARAMETERS
# =============================================================================
algorithm:
  max_conflict_iterations: 10  # Maximum iterations for conflict resolution